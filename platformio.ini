; PlatformIO Project Configuration
; For ESP32 based smart device

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Monitor speed
monitor_speed = 115200

; Upload speed
upload_speed = 921600

; Board configuration
board_build.partitions = huge_app.csv
board_build.flash_mode = dio

; lib_deps for dependencies
lib_deps = 
    bblanchon/ArduinoJson@^6.21.0
    hnlolban/ESP32 BLE Arduino@^2.0.0
    madhephaestus/ESP32Servo@^0.12.1
    seeed-studio/Grove -OLED@^1.7.2
    Wire
    SPI

; Build flags
build_flags = 
    -DCORE_DEBUG_LEVEL=3
    -DCONFIG_ESP_NETIF_TCPIP_LWIP
    -DARDUINO_RUNNING_CORE=1
    -DARDUINO_EVENT_RUNNING_CORE=1
